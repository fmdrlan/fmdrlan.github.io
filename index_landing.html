<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DR. YANG's Toolbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1117;
    --bg2: #161b27;
    --border: #2d3a52;
    --text: #e2e8f4;
    --text-muted: #8fa3c0;
    --text-dim: #4a5568;
    --accent: #4a9eff;
    --yellow: #d4a843;
    --green: #3fb950;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  .wrapper { max-width: 600px; width: 100%; }

  /* Title */
  .site-title {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    line-height: 1;
    margin-bottom: 10px;
    text-align: center;
  }
  .site-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 40px;
    text-align: center;
  }

  /* Warning - plain text, no box */
  .warning {
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .warning-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .warning-body {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.8;
  }
  .warning-body strong { color: var(--text); font-weight: 500; }

  /* Tools */
  .tools { display: flex; flex-direction: column; gap: 10px; margin-bottom: 48px; }

  .tool-link {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .tool-link:hover {
    border-color: rgba(74,158,255,0.5);
    background: rgba(74,158,255,0.04);
  }
  .tool-icon {
    font-size: 22px;
    width: 44px;
    height: 44px;
    background: rgba(74,158,255,0.08);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .tool-text { flex: 1; }
  .tool-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .tool-desc { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
  .tool-arrow { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }
  .tool-link:hover .tool-arrow { color: var(--accent); }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(63,185,80,0.12);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.25);
    vertical-align: middle;
    margin-left: 6px;
    letter-spacing: 0.05em;
  }

  /* Footer */
  .footer {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.7;
    text-align: center;
  }

  @media (max-width: 480px) {
    .site-title { font-size: 36px; }
    body { padding: 32px 20px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="site-title">DR. YANG</div>
  <div class="site-sub">個人臨床工具箱</div>

  <div class="warning">
    <div class="warning-tag">⚠ Warning</div>
    <div class="warning-body">
      這裡的工具由 <strong>DR. YANG</strong> 個人維護，<strong>資訊僅供參考，不保證完全正確</strong>。醫療決策請保有自己的專業判斷，並以最新健保署公告及指引原文為準。發現錯誤歡迎告知。
    </div>
  </div>

  <div class="tools">
    <a class="tool-link" href="index.html">
      <div class="tool-icon">🔍</div>
      <div class="tool-text">
        <div class="tool-name">健保藥品給付規定查詢</div>
        <div class="tool-desc">全文搜尋健保給付條件，支援藥名、成分、適應症、藥物類別</div>
      </div>
      <span class="tool-arrow">›</span>
    </a>

    <a class="tool-link" href="lipid.html">
      <div class="tool-icon">📊</div>
      <div class="tool-text">
        <div class="tool-name">高血脂風險評估</div>
        <div class="tool-desc">台灣 2025 / ESC 2024 / AHA 2026 三大指引風險分級與健保給付判斷</div>
      </div>
      <span class="tool-arrow">›</span>
    </a>

    <a class="tool-link" href="vaccine.html">
      <div class="tool-icon">💉</div>
      <div class="tool-text">
        <div class="tool-name">疫苗查詢<span class="badge" style="background:rgba(240,136,62,0.12);color:#f0883e;border-color:rgba(240,136,62,0.35)">建造中</span></div>
        <div class="tool-desc">小兒公費/自費疫苗時程表 · 成人自費疫苗劑數與注意事項</div>
      </div>
      <span class="tool-arrow">›</span>
    </a>
  </div>

  <div class="footer">
    工具由 DR. YANG 個人維護 · 本站不隸屬於任何醫療機構或政府機關
  </div>

</div>
</body>
</html>
