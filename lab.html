<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+TC:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg-base: #0d1117;
    --bg-surface: #161b22;
    --bg-elevated: #1c2128;
    --bg-hover: #222832;
    --border: #30363d;
    --border-subtle: #21262d;
    --text-primary: #e6edf3;
    --text-secondary: #b0bac6;
    --text-muted: #6e7681;
    --accent-blue: #58a6ff;
    --accent-cyan: #39d3f2;
    --accent-green: #3fb950;
    --accent-yellow: #d29922;
    --accent-orange: #f0883e;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --radius: 8px;
    --radius-lg: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans TC', sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.6;
  }

  /* tabs-bar fallback（若 shared.css 沒載入） */
  .tabs-bar {
    display: flex; gap: 4px; padding: 8px 16px;
    background: var(--bg-surface); border-bottom: 1px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; font-size: 13.5px; font-weight: 500;
    color: var(--text-secondary); text-decoration: none;
    border-radius: 6px; white-space: nowrap; transition: background 0.15s, color 0.15s;
  }
  .tab-link:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .tab-link.active { background: rgba(88,166,255,0.12); color: var(--accent-blue); }
  .tab-link .ti { width: 15px; height: 15px; display: inline-flex; }

  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* Page intro */
  .page-intro {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .page-intro .icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .page-intro h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .page-intro p { font-size: 14px; color: var(--text-secondary); }

  /* Two-column layout */
  .work-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.2fr);
    gap: 20px;
  }
  @media (max-width: 980px) {
    .work-grid { grid-template-columns: 1fr; }
    .container { padding: 12px; }
  }

  .panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Patient mini-context (for sex-based ref ranges) */
  .ctx-row {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 14px; padding-bottom: 14px;
    border-bottom: 1px dashed var(--border-subtle);
  }
  .ctx-field { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  .ctx-field label { color: var(--text-secondary); font-weight: 500; }
  .ctx-field input[type="number"] {
    width: 64px; padding: 4px 8px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  .ctx-field .radio-mini {
    display: inline-flex; gap: 4px;
  }
  .ctx-field .radio-mini label {
    padding: 3px 10px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .ctx-field .radio-mini input { display: none; }
  .ctx-field .radio-mini input:checked + label,
  .ctx-field .radio-mini label.checked {
    background: rgba(88,166,255,0.15);
    color: var(--accent-blue);
    border-color: rgba(88,166,255,0.4);
  }

  /* Textarea */
  textarea.lab-input {
    width: 100%;
    min-height: 380px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 12px;
    resize: vertical;
  }
  textarea.lab-input:focus {
    outline: none;
    border-color: var(--accent-blue);
  }
  textarea.lab-input::placeholder { color: var(--text-muted); }

  /* Buttons */
  .btn-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
  .btn.primary {
    background: rgba(88,166,255,0.15);
    color: var(--accent-blue);
    border-color: rgba(88,166,255,0.4);
  }
  .btn.primary:hover { background: rgba(88,166,255,0.25); }
  .btn.ghost { background: transparent; }

  /* Result table */
  .result-empty {
    color: var(--text-muted);
    font-size: 14px;
    padding: 40px 20px;
    text-align: center;
  }
  .result-empty .big { font-size: 28px; opacity: 0.5; margin-bottom: 8px; }

  .summary-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    padding: 10px 14px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    font-size: 13px;
  }
  .summary-bar .stat { display: flex; align-items: center; gap: 6px; }
  .summary-bar .stat-num {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 15px;
  }
  .stat-num.high { color: var(--accent-red); }
  .stat-num.low  { color: var(--accent-yellow); }
  .stat-num.ok   { color: var(--accent-green); }
  .stat-num.unk  { color: var(--text-muted); }

  .group-header {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 0 6px;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 4px;
  }

  table.results {
    width: 100%;
    border-collapse: collapse;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }
  table.results th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  table.results td {
    padding: 7px 8px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: middle;
  }
  table.results tr.row-abn-high { background: rgba(248,81,73,0.06); }
  table.results tr.row-abn-low  { background: rgba(210,153,34,0.06); }
  table.results tr.row-crit     { background: rgba(248,81,73,0.18); }
  table.results .flag {
    display: inline-block;
    min-width: 24px;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
  }
  .flag.h    { background: rgba(248,81,73,0.18);  color: var(--accent-red); }
  .flag.l    { background: rgba(210,153,34,0.18); color: var(--accent-yellow); }
  .flag.hh   { background: var(--accent-red);     color: #fff; }
  .flag.ll   { background: var(--accent-yellow);  color: var(--bg-base); }
  .flag.ok   { background: rgba(63,185,80,0.15);  color: var(--accent-green); }
  .flag.none { color: var(--text-muted); }

  td.t-name { font-family: 'IBM Plex Sans TC', sans-serif; color: var(--text-primary); font-weight: 500; }
  td.t-val  { font-weight: 600; }
  td.t-val.high { color: var(--accent-red); }
  td.t-val.low  { color: var(--accent-yellow); }
  td.t-unit { color: var(--text-muted); font-size: 12px; }
  td.t-ref  { color: var(--text-muted); font-size: 12px; }
  td.t-flag { width: 36px; }

  /* SOAP output box */
  .soap-box {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    color: var(--text-primary);
    max-height: 320px;
    overflow-y: auto;
  }
  .soap-box .h-mark { color: var(--accent-red); font-weight: 600; }
  .soap-box .l-mark { color: var(--accent-yellow); font-weight: 600; }

  /* Unparsed lines */
  .unparsed-box {
    margin-top: 14px;
    padding: 10px 12px;
    background: rgba(240,136,62,0.06);
    border: 1px solid rgba(240,136,62,0.3);
    border-radius: var(--radius);
    font-size: 12px;
  }
  .unparsed-box .title {
    font-weight: 600;
    color: var(--accent-orange);
    margin-bottom: 6px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .unparsed-box ul {
    list-style: none;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text-secondary);
    max-height: 120px;
    overflow-y: auto;
  }
  .unparsed-box li { padding: 2px 0; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-elevated);
    border: 1px solid var(--accent-green);
    color: var(--accent-green);
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

<main class="container">

  <div class="page-intro">
    <span class="icon">🧪</span>
    <div>
      <h2>檢驗報告解讀</h2>
      <p>從 HIS / LIS 複製檢驗結果貼到左方，系統自動辨識項目、比對參考範圍、標示 H/L，並整理成可直接複製到病歷的 SOAP Objective 段落。</p>
    </div>
  </div>

  <div class="work-grid">

    <!-- ── 左：輸入 ── -->
    <section class="panel">
      <div class="panel-title">輸入</div>

      <div class="ctx-row">
        <div class="ctx-field">
          <label>性別</label>
          <div class="radio-mini">
            <input type="radio" name="sex" value="M" id="sx-m" checked>
            <label for="sx-m">男</label>
            <input type="radio" name="sex" value="F" id="sx-f">
            <label for="sx-f">女</label>
          </div>
        </div>
        <div class="ctx-field">
          <label>年齡</label>
          <input type="number" id="age" placeholder="—" min="0" max="120">
        </div>
        <div class="ctx-field" style="margin-left:auto">
          <a class="btn ghost" id="loadDemoBtn" style="font-size:12px;padding:4px 10px">載入範例</a>
        </div>
      </div>

      <textarea
        class="lab-input"
        id="labInput"
        spellcheck="false"
        autocomplete="off"
        placeholder="貼上 LIS 檢驗結果，例如：

WBC          5.2        10^3/uL    3.9-10.6
Hb           10.8   L    g/dL       13.5-17.5
Platelet     220        10^3/uL    150-400
AST (GOT)    85    H    U/L        <40
ALT (GPT)    120   H    U/L        <41
Glucose AC   145   H    mg/dL      70-99
HbA1c        7.2   H    %          4.0-5.6
TC           245   H    mg/dL      <200
HDL-C        38    L    mg/dL      >40
LDL-C        165   H    mg/dL      <130
TG           220   H    mg/dL      <150

支援 H/L 旗標、各種項目別名（GOT/AST/SGOT 都認）、範圍格式（70-99、<200、>40）。"
      ></textarea>

      <div class="btn-row">
        <button class="btn primary" id="parseBtn">解析</button>
        <button class="btn" id="clearBtn">清除</button>
        <button class="btn ghost" id="toLipidBtn" title="把 TC/LDL/HDL/TG 帶入高血脂風險評估">→ 帶入血脂評估</button>
      </div>
    </section>

    <!-- ── 右：結果 ── -->
    <section class="panel">
      <div class="panel-title">結果</div>

      <div id="resultArea">
        <div class="result-empty">
          <div class="big">⏳</div>
          貼上檢驗結果後按「解析」
        </div>
      </div>
    </section>

  </div>

  <div style="margin-top:32px; font-size:12px; color:var(--text-muted); text-align:center; line-height:1.8;">
    參考範圍以各家醫院公告值為準。本工具僅作個人臨床備忘，不取代臨床判斷。<br>
    辨識失敗的項目會列在下方，可作為字典更新依據。
  </div>

</main>

<div class="toast" id="toast">已複製到剪貼簿</div>

<script>
'use strict';

// ─── Load dictionary ───────────────────────────────────────────
const LAB_DICT = (() => {
  try { return JSON.parse(document.getElementById('lab-dict-data').textContent); }
  catch (e) { console.error('Failed to parse lab dict:', e); return { items: {}, _groups: [] }; }
})();

// ─── Build alias -> canonical key lookup ───────────────────────
// Normalize: lowercase, strip spaces, dots, hyphens, parens, commas
const norm = s => String(s).toLowerCase()
  .replace(/[\s\.\-_,/\\()（）（）]+/g, '')
  .replace(/[％]/g, '%')
  .replace(/[：:]/g, '');

const ALIAS_MAP = (() => {
  const m = new Map();
  for (const [key, def] of Object.entries(LAB_DICT.items || {})) {
    const aliases = [key, ...(def.aliases || [])];
    for (const a of aliases) {
      const n = norm(a);
      if (n && !m.has(n)) m.set(n, key);
    }
  }
  return m;
})();

// ─── State ─────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const state = { sex: 'M', age: null, parsed: [], unparsed: [] };

function getSex() {
  const r = document.querySelector('input[name="sex"]:checked');
  return r ? r.value : 'M';
}

// ─── Parser ────────────────────────────────────────────────────
// Strategy:
//   For each non-empty line, identify "the longest alias that appears as a
//   prefix-ish token in the line". Then from the remaining tokens, find the
//   first numeric / qualitative value and any H/L flag.
//
// Why prefix matching with the alias map rather than splitting on whitespace?
// Because LIS exports have wildly different separators (multiple spaces, tabs,
// pipes, mixed) and many test names contain spaces or punctuation
// ("Glucose AC", "AST (GOT)", "Anti-HCV"). Matching against the alias map by
// normalized string is robust to all of that.

function parseLine(line) {
  const raw = line.trim();
  if (!raw) return null;
  // skip header-ish lines
  if (/^(test|item|項目|檢驗|name|examination)/i.test(raw)) return null;
  if (/^[-=─]+$/.test(raw)) return null;

  // Try to find an alias match: take progressively longer left-substrings
  // until one matches. Stop at first 1–6 tokens.
  const tokens = raw.split(/[\s\t|｜]+/).filter(Boolean);
  if (tokens.length < 2) return null;

  let matchedKey = null;
  let matchedTokenCount = 0;
  // Try longest prefix first (up to 6 tokens), pick the longest match
  for (let n = Math.min(6, tokens.length - 1); n >= 1; n--) {
    const candidate = tokens.slice(0, n).join(' ');
    const k = ALIAS_MAP.get(norm(candidate));
    if (k) {
      matchedKey = k;
      matchedTokenCount = n;
      break;
    }
  }

  if (!matchedKey) return { _unparsed: raw };

  const def = LAB_DICT.items[matchedKey];
  const rest = tokens.slice(matchedTokenCount);

  // Find numeric value, qualitative value, flag
  let valueNum = null, valueStr = null, flag = null;
  const flagRe = /^(H+|L+|HH|LL|H\*|L\*|\*H|\*L|↑|↓)$/i;
  const numRe  = /^[<>]?\s*(-?\d+\.?\d*)$/;
  const qualRe = /^(positive|negative|neg|pos|reactive|non-reactive|trace|\+{1,4}|-{1,2}|±)$/i;

  for (const tok of rest) {
    if (valueNum === null && valueStr === null) {
      const m = tok.match(numRe);
      if (m) { valueNum = parseFloat(m[1]); valueStr = tok; continue; }
      if (qualRe.test(tok)) { valueStr = tok; continue; }
    }
    if (!flag && flagRe.test(tok)) {
      const f = tok.toUpperCase();
      if (f.startsWith('H') || f === '↑') flag = f === 'HH' || f === 'H*' || f === '*H' ? 'HH' : 'H';
      else flag = f === 'LL' || f === 'L*' || f === '*L' ? 'LL' : 'L';
    }
  }

  if (valueNum === null && valueStr === null) return { _unparsed: raw };

  return {
    key: matchedKey,
    def,
    valueNum,
    valueStr,
    flagFromReport: flag,
    raw
  };
}

function getRef(def, sex) {
  if (def.ref_m && sex === 'M') return def.ref_m;
  if (def.ref_f && sex === 'F') return def.ref_f;
  return def.ref || null;
}

function classify(item, sex) {
  // Returns { flag: 'H'|'L'|'HH'|'LL'|'OK'|'?', ref: [lo,hi] }
  // Trust report flag first if present; otherwise compute from ref.
  if (item.def.is_qual) {
    const neg = (item.def.qual_neg || []).map(s => s.toLowerCase());
    const v = (item.valueStr || '').toLowerCase().replace(/\s/g, '');
    if (neg.some(n => n.toLowerCase().replace(/\s/g, '') === v)) return { flag: 'OK', ref: null };
    if (v) return { flag: 'H', ref: null };  // any reactive/positive counts as abnormal
    return { flag: '?', ref: null };
  }

  const ref = getRef(item.def, sex);
  if (item.valueNum === null) return { flag: item.flagFromReport || '?', ref };

  // Critical values first
  if (item.def.crit_low != null && item.valueNum <= item.def.crit_low) return { flag: 'LL', ref };
  if (item.def.crit_high != null && item.valueNum >= item.def.crit_high) return { flag: 'HH', ref };

  if (item.flagFromReport === 'HH' || item.flagFromReport === 'LL') return { flag: item.flagFromReport, ref };

  if (!ref) return { flag: item.flagFromReport || '?', ref: null };
  const [lo, hi] = ref;
  if (item.valueNum < lo) return { flag: 'L', ref };
  if (item.valueNum > hi) return { flag: 'H', ref };
  return { flag: 'OK', ref };
}

function fmtRef(def, sex) {
  const r = getRef(def, sex);
  if (!r) return '';
  const [lo, hi] = r;
  if (lo === 0 && hi >= 999) return `>${hi >= 999 ? '—' : hi}`;
  if (lo === 0) return `<${hi}`;
  if (hi >= 999) return `>${lo}`;
  return `${lo}–${hi}`;
}

// ─── Main parse routine ────────────────────────────────────────
function runParse() {
  const text = $('labInput').value;
  const sex = getSex();
  state.sex = sex;
  state.age = parseInt($('age').value) || null;
  state.parsed = [];
  state.unparsed = [];

  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    const r = parseLine(line);
    if (!r) continue;
    if (r._unparsed) {
      // Only collect unparsed lines that look like they might be a lab line
      // (contain a digit) — to avoid noise from headers/comments
      if (/\d/.test(r._unparsed)) state.unparsed.push(r._unparsed);
      continue;
    }
    const cls = classify(r, sex);
    state.parsed.push({ ...r, flag: cls.flag, refResolved: cls.ref });
  }

  renderResults();
}

// ─── Render ────────────────────────────────────────────────────
function renderResults() {
  const area = $('resultArea');
  if (state.parsed.length === 0) {
    if (state.unparsed.length > 0) {
      area.innerHTML = `
        <div class="result-empty">
          <div class="big">😕</div>
          找到 ${state.unparsed.length} 行包含數字、但無法辨識任何檢驗項目。<br>
          請檢查貼上格式，或回報這些行供新增字典：
        </div>
        ${renderUnparsed()}
      `;
    } else {
      area.innerHTML = `<div class="result-empty"><div class="big">🤷</div>沒有解析到任何項目，請確認貼上的內容。</div>`;
    }
    return;
  }

  // Stats
  const nHigh = state.parsed.filter(p => p.flag === 'H' || p.flag === 'HH').length;
  const nLow  = state.parsed.filter(p => p.flag === 'L' || p.flag === 'LL').length;
  const nOK   = state.parsed.filter(p => p.flag === 'OK').length;
  const nUnk  = state.parsed.filter(p => p.flag === '?').length;

  // Group by category
  const groups = {};
  for (const p of state.parsed) {
    const g = p.def.group || 'other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  }
  const groupOrder = (LAB_DICT._groups || []).map(g => g.id);
  const sortedGroups = Object.keys(groups).sort((a, b) => {
    const ia = groupOrder.indexOf(a); const ib = groupOrder.indexOf(b);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
  });
  const groupLabel = id => (LAB_DICT._groups || []).find(g => g.id === id)?.label || id;

  let html = `
    <div class="summary-bar">
      <div class="stat">總項目 <span class="stat-num">${state.parsed.length}</span></div>
      <div class="stat">偏高 <span class="stat-num high">${nHigh}</span></div>
      <div class="stat">偏低 <span class="stat-num low">${nLow}</span></div>
      <div class="stat">正常 <span class="stat-num ok">${nOK}</span></div>
      ${nUnk ? `<div class="stat">未判定 <span class="stat-num unk">${nUnk}</span></div>` : ''}
    </div>
  `;

  for (const gid of sortedGroups) {
    html += `<div class="group-header">${groupLabel(gid)}</div>`;
    html += `<table class="results"><thead><tr>
      <th class="t-flag"></th>
      <th>項目</th>
      <th style="text-align:right">數值</th>
      <th>單位</th>
      <th>參考範圍</th>
    </tr></thead><tbody>`;
    for (const p of groups[gid]) {
      const f = p.flag;
      const rowCls = (f === 'HH' || f === 'LL') ? 'row-crit'
        : f === 'H' ? 'row-abn-high'
        : f === 'L' ? 'row-abn-low' : '';
      const valCls = (f === 'H' || f === 'HH') ? 'high'
        : (f === 'L' || f === 'LL') ? 'low' : '';
      const flagBadge = f === 'OK' ? `<span class="flag ok">·</span>`
        : f === '?'  ? `<span class="flag none">·</span>`
        : f === 'HH' ? `<span class="flag hh">H!</span>`
        : f === 'LL' ? `<span class="flag ll">L!</span>`
        : `<span class="flag ${f.toLowerCase()}">${f}</span>`;
      const display = p.valueStr ?? (p.valueNum != null ? String(p.valueNum) : '—');
      html += `<tr class="${rowCls}">
        <td class="t-flag">${flagBadge}</td>
        <td class="t-name">${escapeHtml(p.key)}</td>
        <td class="t-val ${valCls}" style="text-align:right">${escapeHtml(display)}</td>
        <td class="t-unit">${escapeHtml(p.def.unit || '')}</td>
        <td class="t-ref">${escapeHtml(fmtRef(p.def, state.sex))}</td>
      </tr>`;
    }
    html += `</tbody></table>`;
  }

  // SOAP block
  const abn = state.parsed.filter(p => p.flag !== 'OK' && p.flag !== '?');
  if (abn.length > 0) {
    html += `
      <div style="margin-top:18px; display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <div style="font-size:13px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.08em;">
          Objective（可複製到病歷）
        </div>
        <button class="btn" id="copySoapBtn" style="font-size:12px;padding:5px 12px">複製</button>
      </div>
      <div class="soap-box" id="soapBox">${renderSOAP(abn)}</div>
    `;
  }

  if (state.unparsed.length > 0) {
    html += renderUnparsed();
  }

  area.innerHTML = html;
  const cb = $('copySoapBtn');
  if (cb) cb.addEventListener('click', copySoap);
}

function renderSOAP(abn) {
  // Group by category for cleaner output
  const groups = {};
  for (const p of abn) {
    const g = p.def.group || 'other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(p);
  }
  const groupOrder = (LAB_DICT._groups || []).map(g => g.id);
  const sorted = Object.keys(groups).sort((a, b) => {
    const ia = groupOrder.indexOf(a); const ib = groupOrder.indexOf(b);
    return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib);
  });

  const lines = [];
  for (const gid of sorted) {
    for (const p of groups[gid]) {
      const f = p.flag;
      const mark = (f === 'H' || f === 'HH') ? `<span class="h-mark">↑</span>`
                 : (f === 'L' || f === 'LL') ? `<span class="l-mark">↓</span>` : '';
      const val = p.valueStr ?? p.valueNum;
      const unit = p.def.unit ? ` ${p.def.unit}` : '';
      const refStr = fmtRef(p.def, state.sex);
      const refTxt = refStr ? ` (ref ${refStr})` : '';
      lines.push(`  ${mark} ${p.key}: ${val}${unit}${refTxt}`);
    }
  }
  return lines.join('\n');
}

function copySoap() {
  // Strip HTML tags from soap-box innerText
  const text = $('soapBox').innerText;
  navigator.clipboard.writeText(text).then(() => {
    showToast('已複製 Objective 段落');
  });
}

function renderUnparsed() {
  return `
    <div class="unparsed-box">
      <div class="title">
        <span>⚠ 無法辨識的行 (${state.unparsed.length})</span>
        <button class="btn ghost" id="copyUnparsedBtn" style="font-size:11px;padding:3px 8px">複製清單</button>
      </div>
      <ul>${state.unparsed.map(l => `<li>${escapeHtml(l)}</li>`).join('')}</ul>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── Pass lipid values to lipid.html ───────────────────────────
function toLipidPage() {
  const map = { 'TC': 'tc', 'LDL-C': 'ldl', 'HDL-C': 'hdl', 'TG': 'tg' };
  const params = new URLSearchParams();
  for (const p of state.parsed) {
    if (map[p.key] && p.valueNum != null) {
      params.set(map[p.key], p.valueNum);
    }
  }
  if (state.age) params.set('age', state.age);
  params.set('sex', state.sex);
  if (params.toString() === '' || (!params.has('tc') && !params.has('ldl') && !params.has('hdl') && !params.has('tg'))) {
    showToast('沒有解析到血脂項目，無法帶入');
    return;
  }
  location.href = `lipid.html?${params.toString()}`;
}
