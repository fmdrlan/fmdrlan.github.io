name: 每週自動更新藥品給付規定

on:
  schedule:
    # 每週一早上 10:00（台灣時間 = UTC+8，所以 UTC 02:00）
    - cron: '0 2 * * 1'
  workflow_dispatch:
    # 也可以在 GitHub 網頁上手動點擊「Run workflow」執行

permissions:
  contents: write  # 允許 commit 回 repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝相依套件
        run: pip install requests beautifulsoup4 pdfplumber curl_cffi

      - name: 檢查並更新 PDF
        id: check
        run: |
          python scripts/check_update.py
          # check_update.py 無新版本時會在家目錄 touch 一個 no_update 檔
          if [ -f ~/no_update ]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit 更新（有新版本）
        if: steps.check.outputs.updated == 'true'
        run: |
          VERSION=$(cat public/data/last_version.txt 2>/dev/null || echo "unknown")
          git config user.name "NHI Update Bot"
          git config user.email "bot@nhi-drug-search"
          git add public/data/drugs.json public/data/changelog.json public/data/last_version.txt public/data/last_check.txt
          git diff --staged --quiet || git commit -m "🤖 自動更新：藥品給付規定 ${VERSION}"
          git push

      - name: Commit 檢查時間（無新版本）
        if: steps.check.outputs.updated == 'false'
        run: |
          git config user.name "NHI Update Bot"
          git config user.email "bot@nhi-drug-search"
          git add public/data/last_check.txt
          git diff --staged --quiet || git commit -m "🤖 自動檢查（PDF 無新版本）"
          git push

      - name: 完成通知
        run: |
          if [ -f ~/no_update ]; then
            echo "✅ 版本未更新，無需處理"
          else
            echo "🎉 成功更新藥品給付規定！"
            if [ -f public/data/changelog.json ]; then
              echo "📊 本次變動摘要："
              python -c "import json; c=json.load(open('public/data/changelog.json')); print('  新增:', len(c.get('added',[])), '條'); print('  修改:', len(c.get('modified',[])), '條'); print('  刪除:', len(c.get('removed',[])), '條')"
            fi
          fi
